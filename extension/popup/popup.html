<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>FixateScholar</h1>

  <label class="row switch">
    <span>Fixation typography</span>
    <input type="checkbox" id="enabled">
  </label>

  <label class="row switch">
    <span>Emphasis</span>
    <select id="emphasisMode">
      <option value="dynamic">Dynamic syllables</option>
      <option value="syllable">First syllable</option>
      <option value="fraction">Fixed fraction</option>
    </select>
  </label>

  <label class="row" id="fractionRow">
    <span>Emphasis fraction <output id="fractionOut">40%</output></span>
    <input type="range" id="fraction" min="0.2" max="0.6" step="0.05">
  </label>

  <label class="row">
    <span>Bold weight <output id="weightOut">600</output></span>
    <input type="range" id="boldWeight" min="500" max="900" step="100">
  </label>

  <label class="row switch">
    <span>Font</span>
    <select id="fontMode">
      <option value="original">Original (document)</option>
      <option value="atkinson">Atkinson Hyperlegible</option>
      <option value="inter">Inter</option>
      <option value="literata">Literata</option>
    </select>
  </label>

  <label class="row switch" title="Don't open this site's PDFs in FixateScholar">
    <span>Bypass current site</span>
    <input type="checkbox" id="bypassSite">
  </label>

  <div class="row footer">
    <a href="#" id="openOptions">All settings</a>
  </div>

  <script src="popup.mjs" type="module"></script>
</body>
</html>
